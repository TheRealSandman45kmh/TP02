services:
  
  db_mongo:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGODB_INITDB_ROOT_USERNAME}
      - MONGODB_INITDB_ROOT_PASSWORD=${MONGODB_INITDB_ROOT_PASSWORD}
    volumes:
      - ./mongodb/bdd.js:/docker-entrypoint-initdb.d/bdd.js:ro
    healthcheck:
      # Utilisation du format Shell direct pour permettre l'expansion des variables
      # On utilise $$ pour dire à Docker Compose de ne pas interpréter la variable lui-même
      test: mongosh -u $$MONGODB_INITDB_ROOT_USERNAME -p $$MONGODB_INITDB_ROOT_PASSWORD --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  
  db_mysql:
    image: mysql:8.0 # mysql:9.6 n'existe pas encore en version stable, 8.0 est plus sûr
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d
    healthcheck:
      # mysqladmin ping est plus léger et fiable pour un test de santé
      test: mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  admin_mongo:
    image: mongo-express
    restart: on-failure
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGODB_INITDB_ROOT_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGODB_INITDB_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_SERVER=${ME_CONFIG_MONGODB_SERVER}
    depends_on:
      db_mongo:
        condition: service_healthy

  admin_mysql:
    image: adminer
    restart: on-failure
    ports:
      - 8080:8080
    depends_on:
      db_mysql:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./api:/app
    working_dir: /app
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MONGO_URL=${MONGO_URL}
    healthcheck:
      test: curl -f http://localhost:8000/users && curl -f http://localhost:8000/posts
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000