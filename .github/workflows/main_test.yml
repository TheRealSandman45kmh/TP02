name: Challenge CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1 : Analyse de Sécurité (Build & Scan) [cite: 17]
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: docker build -t my-api:1.0.0 -f ./api/Dockerfile .

      # Docker Scout doit bloquer si vulnérabilité "critical" 
      - name: Docker Scout Scan API
        uses: docker/scout-action@v1
        with:
          command: cves
          image: my-api:1.0.0
          only-severities: critical
          exit-code: true 

      # Trivy scan l'image MySQL mais ne bloque pas la pipeline [cite: 20, 22]
      - name: Trivy Scan MySQL (Report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mysql:9.6'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # JOB 2 : Tests d'Intégration [cite: 23]
  integration-tests:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape cruciale : Générer le .env à la volée 
      # Cela garantit que toutes les étapes (compose up, script bash, logs) ont accès aux variables
      - name: Generate .env file
        run: |
          echo "MONGODB_INITDB_ROOT_USERNAME=admin" >> .env
          echo "MONGODB_INITDB_ROOT_PASSWORD=${{ secrets.MONGODB_INITDB_ROOT_PASSWORD }}" >> .env
          echo "MONGO_URL=mongodb://admin:${{ secrets.MONGODB_INITDB_ROOT_PASSWORD }}@db_mongo:27017" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env
          echo "MYSQL_USER=root" >> .env
          echo "MYSQL_HOST=db_mysql" >> .env
          echo "ME_CONFIG_MONGODB_SERVER=db_mongo" >> .env

      - name: Build and Start Stack
        run: docker compose up -d --build

      # Script de santé avec boucle de 12 tentatives [cite: 28, 35]
      - name: Wait for healthy containers
        run: |
          echo "Waiting for main containers to become healthy..."

          for i in {1..24}; do
            echo "Attempt $i/24"

            docker compose ps api db_mongo db_mysql

            unhealthy=$(docker compose ps api db_mongo db_mysql --format json | jq -r 'select(.Health != "healthy") | .Name + " = " + (.Health // "no-healthcheck")' || true)

            if [ -z "$unhealthy" ]; then
              echo "Main containers are healthy"
              exit 0
            fi

            echo "Not ready yet:"
            echo "$unhealthy"
            sleep 5
          done

          echo "Containers did not become healthy in time"
          docker compose ps
          docker compose logs api
          docker compose logs db_mongo
          docker compose logs db_mysql
          exit 1

      # Validation finale avec curl sur les routes métiers
      - name: Test posts route
        run: |
          docker compose ps
          curl -v http://localhost:8000/posts || (docker compose logs api && exit 1)

      - name: Stop docker compose stack
        if: always()
        run: docker compose down

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: |
          docker compose ps
          docker compose logs

  # JOB 3 : Publication [cite: 30]
  publish:
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Final Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-api:latest
