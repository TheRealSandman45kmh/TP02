name: Challenge CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: docker build -t my-api:1.0.0 -f ./api/Dockerfile .

      - name: Docker Scout Scan API
        uses: docker/scout-action@v1
        with:
          command: cves, recommendations
          image: my-api:1.0.0
          file: ./api/Dockerfile
          only-severities: critical, high
          exit-code: false
          
      - name: Trivy Scan MySQL (Report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mysql:9.6'
          severity: 'CRITICAL,HIGH'
          exit-code: false

  build-and-scan-mongo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build MongoDB image
        run: docker build -t my-mongo:1.0.0 -f ./mongodb/Dockerfile .

      - name: Docker Scout Scan MongoDB
        uses: docker/scout-action@v1
        with:
          command: cves, recommendations
          image: my-mongo:1.0.0
          file: ./mongodb/Dockerfile
          only-severities: critical, high
          exit-code: false
          
  docker-compose:
    needs: [build-and-scan-api, build-and-scan-mongo]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Start Stack
        run: docker compose up -d --build
        env:
          # MongoDB
          MONGODB_INITDB_ROOT_USERNAME: ${{ secrets.MONGODB_INITDB_ROOT_USERNAME }}
          MONGODB_INITDB_ROOT_PASSWORD: ${{ secrets.MONGODB_INITDB_ROOT_PASSWORD }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          ME_CONFIG_MONGODB_SERVER: ${{ secrets.ME_CONFIG_MONGODB_SERVER }}

          # MySQL
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: |
          echo "=== État des conteneurs ==="
          docker compose ps
          echo "=== Logs de la base MySQL ==="
          docker compose logs db_mysql
          echo "=== Logs de la base MongoDB ==="
          docker compose logs db_mongo
          echo "=== Logs de l'API ==="
          docker compose logs api

      - name: Healthcheck Script (Challenge Technique)
        run: |
          # Tentatives : 12 fois 5 secondes = 60 secondes
          for i in {1..12}; do
            STATUS=$(docker compose ps --format json | jq -r '.[].Health' | grep -v "healthy" | wc -l)
            if [ "$STATUS" -eq 0 ]; then
              echo "Tous les services sont Healthy !"
              exit 0
            fi
            echo "Attente des services... (essai $i/12)"
            sleep 5
          done
          echo "Erreur : Temps écoulé, services non prêts."
          exit 1

      - name: Validation Fonctionnelle
        run: |
          curl -f http://localhost:8000/users [cite: 29]
          curl -f http://localhost:8000/posts [cite: 29]
          
